<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenCode Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .active-tab { border-bottom: 3px solid #10b981; color: #065f46; font-weight: 900; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-[#115e59] flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 text-center">
        <h2 class="text-xl font-black text-[#115e59] uppercase tracking-widest mb-6">GreenCode Analyzer</h2>
        
        <div class="flex mb-8 border-b border-gray-200 text-xs uppercase tracking-widest font-bold text-gray-400">
            <button id="tab-login" onclick="switchMode('login')" class="flex-1 pb-2 active-tab">Login</button>
            <button id="tab-signup" onclick="switchMode('signup')" class="flex-1 pb-2">Create Account</button>
        </div>

        <div class="space-y-4">
             <input type="text" id="username" placeholder="Pick a Username" class="hidden w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50 text-sm font-mono">
            <input type="text" id="identifier" placeholder="Username or Email" class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50 text-sm font-mono">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50 text-sm font-mono">
        </div>

        <div class="mt-8 space-y-3">
            <button id="btn-login" onclick="logIn()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold uppercase tracking-widest text-xs transition-all shadow-md">
                Enter Dashboard
            </button>
            <button id="btn-signup" onclick="signUp()" class="hidden w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold uppercase tracking-widest text-xs transition-all shadow-md">
                Register Account
            </button>
            <button onclick="resetPassword()" class="text-gray-400 hover:text-emerald-700 text-[10px] font-bold uppercase tracking-widest block w-full py-2">
                Forgot Password?
            </button>
        </div>

        <p id="msg" class="mt-6 text-[10px] font-black uppercase tracking-widest"></p>
    </div>

<script>
    const supabaseUrl = 'https://fadbccudiffeneemlmvb.supabase.co';
    const supabaseKey = 'sb_publishable__VXBEPzv_zSCuysL-UO02Q_LQ2kHh8z';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    const identifierInput = document.getElementById('identifier');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const msgEl = document.getElementById('msg');

    function switchMode(mode) {
        const isLogin = mode === 'login';
        document.getElementById('tab-login').className = isLogin ? 'flex-1 pb-2 active-tab' : 'flex-1 pb-2';
        document.getElementById('tab-signup').className = !isLogin ? 'flex-1 pb-2 active-tab' : 'flex-1 pb-2';
        
        usernameInput.classList.toggle('hidden', isLogin);
        identifierInput.placeholder = isLogin ? "Username or Email" : "Email Address";
        
        document.getElementById('btn-login').classList.toggle('hidden', !isLogin);
        document.getElementById('btn-signup').classList.toggle('hidden', isLogin);
    }

    function showMessage(text, isError = false) {
        msgEl.innerText = text;
        msgEl.className = `mt-6 text-[10px] font-black uppercase tracking-widest ${isError ? 'text-red-500' : 'text-emerald-600'}`;
    }

    async function signUp() {
    const username = usernameInput.value; // Used as a display name
    const email = identifierInput.value; // Now strictly used as email
    const password = passwordInput.value;

    showMessage("Creating account...", false);

    // 1. Create the Auth User
    const { data, error } = await supabaseClient.auth.signUp({
        email: email,
        password: password,
    });

    if (error) return showMessage(error.message, true);

    // 2. Save the Display Name to Profiles
    const { error: profileError } = await supabaseClient
        .from('profiles')
        .insert([{ id: data.user.id, username: username, email: email }]);

    if (profileError) console.error("Profile error:", profileError);
    
    // Redirect instantly since Confirm Email is OFF
    window.location.href = 'index.html';
}

async function logIn() {
    const email = identifierInput.value;
    const password = passwordInput.value;

    showMessage("Authenticating...", false);

    // Simple Email Login
    const { error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password,
    });

    if (error) showMessage(error.message, true);
    else window.location.href = 'index.html';
}

    async function resetPassword() {
        if (!identifierInput.value) return showMessage("Input email first.", true);
        const { error } = await supabaseClient.auth.resetPasswordForEmail(identifierInput.value);
        if (error) showMessage(error.message, true);
        else showMessage("Reset link sent!", false);
    }
</script>
</body>
</html>
